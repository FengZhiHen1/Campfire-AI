[project]
name = "py-schemas"
version = "0.1.0"
description = "Campfire-AI shared package: py-schemas"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_schemas"]
