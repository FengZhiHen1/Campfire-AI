[project]
name = "py-health"
version = "0.1.0"
description = "Campfire-AI shared package: py-health"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "fastapi>=0.115",
    "sqlalchemy>=2.0",
    "redis>=5.0",
    "minio>=7.0",
    "py-logger",
    "py-config",
]

[build-system]
requires = ["uv_build>=0.9.21,<0.10.0"]
build-backend = "uv_build"
