[project]
name = "py-infra"
version = "0.1.0"
description = "Campfire-AI infrastructure contracts — Pydantic models for DEPLOY-01 container orchestration"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["uv_build>=0.9.21,<0.10.0"]
build-backend = "uv_build"

[tool.uv]
package = true
