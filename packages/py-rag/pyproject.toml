[project]
name = "py-rag"
version = "0.1.0"
description = "Campfire-AI shared package: py-rag (embedding, retrieval, indexing pipeline)"
requires-python = ">=3.12"
dependencies = [
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_rag"]
