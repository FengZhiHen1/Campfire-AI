[project]
name = "py-rag"
version = "0.1.0"
description = "Campfire-AI shared package: py-rag (embedding, retrieval, indexing pipeline)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "redis>=5.0",
    "sqlalchemy>=2.0",
    "py-cache",
    "py-config",
    "py-db",
    "py-logger",
    "py-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_rag"]
