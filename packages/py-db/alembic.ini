# Alembic 配置文件 — DEPLOY-04 数据库迁移
#
# 数据库连接串通过环境变量 DATABASE_URL 或 migrate_up/migrate_down
# 的参数注入，此处的 sqlalchemy.url 留空作为占位。
# 同步驱动 psycopg2 用于 DDL 操作，与 ORM 的 asyncpg 驱动分离。

[alembic]
# 迁移脚本目录路径（相对于此 alembic.ini 文件）
script_location = migrations

# 数据库连接串 — 留空，运行时通过 set_main_option 注入
sqlalchemy.url =

# 每份迁移脚本在独立 PostgreSQL 事务中执行
# 单脚本失败 → 事务回滚 → 数据库停留在失败前的版本
transaction_per_migration = True

# 迁移脚本文件命名模板
# %%(rev)s — revision hash (如 1975ea83b712)
# %%(slug)s — 从 message 派生的 slug（如 add_user_nickname）
file_template = %%(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d_%%(slug)s

# 截断 slug 长度，避免文件名过长
truncate_slug_length = 40

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
