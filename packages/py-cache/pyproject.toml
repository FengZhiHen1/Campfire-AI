[project]
name = "py-cache"
version = "0.1.0"
description = "Campfire-AI shared package: py-cache"
requires-python = ">=3.12"
dependencies = [
    "py-config",
    "py-logger",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_cache"]
