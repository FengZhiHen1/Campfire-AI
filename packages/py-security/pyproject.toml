[project]
name = "py-security"
version = "0.1.0"
description = "Campfire-AI shared package: py-security - PII detection, security utilities"
requires-python = ">=3.12"
dependencies = [
    "py-logger",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_security"]
