[project]
name = "py-storage"
version = "0.1.0"
description = "Campfire-AI shared package: py-storage"
requires-python = ">=3.12"
dependencies = [
    "py-config",
    "py-logger",
    "python-magic>=0.4.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_storage"]
