[project]
name = "py-auth"
version = "0.1.0"
description = "Campfire-AI shared package: py-auth"
requires-python = ">=3.12"
dependencies = [
    "bcrypt>=4.0",
    "fastapi>=0.115",
    "py-config",
    "py-logger",
    "py-schemas",
    "passlib[bcrypt]>=1.7.4",
    "python-jose[cryptography]>=3.3.0",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_auth"]
