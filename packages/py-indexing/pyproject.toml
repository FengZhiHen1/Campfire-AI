[project]
name = "py-indexing"
version = "0.1.0"
description = "Campfire-AI shared package: py-indexing (case vectorization indexing pipeline)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "redis>=5.0",
]

[tool.uv]
package = true

[build-system]
requires = ["uv_build>=0.9.21,<0.10.0"]
build-backend = "uv_build"
