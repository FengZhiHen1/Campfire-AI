name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: campfire
          POSTGRES_PASSWORD: test
          POSTGRES_DB: campfire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.x"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest --cov --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://campfire:test@localhost:5432/campfire_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-key-at-least-32-characters-long-not-for-prod

  frontend-react-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter react-web lint

      - name: Build
        run: pnpm --filter react-web build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 预检查 .env.example 存在即可；生产 .env 不在仓库中
      - name: Check environment example
        run: |
          test -f .env.example || (echo "ERROR: .env.example is missing" && exit 1)

      - name: Build api-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api-server/Dockerfile.api
          push: false
          tags: campfire-api-server:ci
          cache-from: type=gha,scope=api-server
          cache-to: type=gha,mode=max,scope=api-server

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile.worker
          push: false
          tags: campfire-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
