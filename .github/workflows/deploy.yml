name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: self-hosted
    environment: production
    timeout-minutes: 20

    steps:
      - name: Compute version tag
        id: meta
        run: |
          VERSION_TAG="${GITHUB_SHA::12}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Deploy on self-hosted runner
        run: |
          set -euo pipefail
          SERVER_PROJECT_DIR="/root/Campfire-AI"
          echo "[deploy] SERVER_PROJECT_DIR=${SERVER_PROJECT_DIR}"
          if [[ ! -d "${SERVER_PROJECT_DIR}/.git" ]]; then
            echo "[deploy] ERROR: ${SERVER_PROJECT_DIR} is not a git repository"
            exit 1
          fi
          cd "${SERVER_PROJECT_DIR}"
          echo "[deploy] syncing code from origin/master..."
          git remote -v
          git fetch origin
          git reset --hard origin/master
          echo "[deploy] running remote deployment script with VERSION_TAG=${VERSION_TAG}"
          bash scripts/deploy-remote.sh "${VERSION_TAG}"
