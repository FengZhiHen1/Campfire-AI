# 编排器全局模型档位映射表
# 放置路径：artifacts/skills/workflow-orchestrator/references/model-mapping.yaml
#
# 职责：工作流只在 stage 中声明抽象档位（light / standard / heavy），
# 编排器在启动 SubAgent 前按当前运行平台读取本文件，解析为具体模型名并传入 Agent(model=...)。
#
# 新增平台时，在每个 tier 下增加对应平台键即可，无需修改工作流或 Skill。

default_platform: claude-code

tiers:
  light:
    # 轻量档：草稿生成、格式化、简单数据提取、测试运行等低复杂度任务
    claude-code: "haiku"
    kimi-code: "kimi-k2.6"

  standard:
    # 标准档：常规编码、分析、审查、文档更新等中等复杂度任务
    claude-code: "sonnet"
    kimi-code: "kimi-k2.6"

  heavy:
    # 重档：复杂架构设计、深度推理、对抗验证、核心重构等高复杂度任务
    claude-code: "opus"
    kimi-code: "kimi-k2.6"
