schema_version: "3.0.0"
workflow_id: "project-design-pipeline"
version: "3.1.0"
max_parallel_agents: 10
anchor_prefix: "wf"

stages:
  # ==================== 虚拟起止 ====================

  - stage_id: s00-workflow-start
    name: "工作流启动"

  - stage_id: s99-workflow-end
    name: "工作流终止"

  # ==================== 阶段一：技术栈设计（s01-s03）====================

  - stage_id: s01-collect-requirements
    name: "收集需求与上下文"
    skill_id: design-tech-stack
    mandatory: true
    confirmation_point: true
    retry: 0
    model: light

  - stage_id: s02-architecture-selection
    name: "架构关节点选型"
    skill_id: design-tech-stack
    mandatory: true
    confirmation_point: true
    retry: 0
    model: light

  - stage_id: s03-tech-stack-output
    name: "技术栈方案输出"
    skill_id: design-tech-stack
    mandatory: true
    confirmation_point: true
    retry: 1
    model: light

  # ==================== 阶段二：项目结构设计（s04）====================

  - stage_id: s04-project-structure-design
    name: "项目结构设计"
    skill_id: project-structure-designer
    mandatory: true
    confirmation_point: true
    retry: 1
    model: light

  # ==================== 阶段三：模块拆解与依赖分析（s05-s06）====================

  - stage_id: s05-module-breakdown
    name: "功能模块拆解"
    skill_id: module-breakdown-designer
    mandatory: true
    confirmation_point: true
    retry: 1
    model: light

  - stage_id: s06-dependency-analysis
    name: "模块依赖分析"
    skill_id: module-dependency-analyzer
    mandatory: true
    confirmation_point: false
    retry: 1
    model: light

  # ==================== 阶段四：模块调度（s07-s08）====================
  #
  # s07: 项目状态汇报 + 用户选择模块 → 输出 parallel_targets
  # s08: wfctl 为 s07 选定的模块并行启动 module-design-pipeline@1.0.0 子工作流

  - stage_id: s07-project-sync-and-dispatch
    name: "项目同步与模块调度"
    skill_id: project-dispatch-manager
    mandatory: true
    confirmation_point: true
    retry: 0
    model: light

  - stage_id: s08-dispatch-modules
    name: "模块设计子工作流调度"
    workflow: module-design-pipeline@1.0.0
    model: light
    parallel:
      source: s07-project-sync-and-dispatch
      max_instances: 10
    mandatory: true
    confirmation_point: false

  # ==================== 阶段五：项目级同步检查（s09）====================

  - stage_id: s09-project-sync-check
    name: "项目级同步矛盾检查"
    skill_id: project-sync-aggregator
    mandatory: true
    confirmation_point: true
    retry: 0
    model: light

# ==================== 流转边 ====================

edges:
  # -- s00 起始 --
  - from: s00-workflow-start
    to: s01-collect-requirements
    condition: always

  # -- s01 收集需求（确认点）--
  - from: s01-collect-requirements
    to: s02-architecture-selection
    condition: confirmed
    choice: "通过"
  - from: s01-collect-requirements
    to: s01-collect-requirements
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s01-collect-requirements
    to: s99-workflow-end
    condition: rejected
    choice: "放弃"
  - from: s01-collect-requirements
    to: s99-workflow-end
    condition: loop_exceeded

  # -- s02 架构选型（确认点）--
  - from: s02-architecture-selection
    to: s03-tech-stack-output
    condition: confirmed
    choice: "通过"
  - from: s02-architecture-selection
    to: s02-architecture-selection
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s02-architecture-selection
    to: s99-workflow-end
    condition: rejected
    choice: "放弃"
  - from: s02-architecture-selection
    to: s99-workflow-end
    condition: loop_exceeded

  # -- s03 技术栈输出（确认点）--
  - from: s03-tech-stack-output
    to: s04-project-structure-design
    condition: confirmed
    choice: "通过"
  - from: s03-tech-stack-output
    to: s03-tech-stack-output
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s03-tech-stack-output
    to: s99-workflow-end
    condition: rejected
    choice: "放弃"
  - from: s03-tech-stack-output
    to: s99-workflow-end
    condition: loop_exceeded

  # -- s04 项目结构设计（确认点）--
  - from: s04-project-structure-design
    to: s05-module-breakdown
    condition: confirmed
    choice: "通过"
  - from: s04-project-structure-design
    to: s04-project-structure-design
    condition: confirmed
    choice: "调整结构"
    max_loop: 3
  - from: s04-project-structure-design
    to: s99-workflow-end
    condition: rejected
    choice: "放弃"
  - from: s04-project-structure-design
    to: s99-workflow-end
    condition: loop_exceeded

  # -- s05 模块拆解（确认点）--
  - from: s05-module-breakdown
    to: s06-dependency-analysis
    condition: confirmed
    choice: "通过"
  - from: s05-module-breakdown
    to: s05-module-breakdown
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s05-module-breakdown
    to: s99-workflow-end
    condition: rejected
    choice: "放弃"
  - from: s05-module-breakdown
    to: s99-workflow-end
    condition: loop_exceeded

  # -- s06 依赖分析（非确认点）--
  - from: s06-dependency-analysis
    to: s07-project-sync-and-dispatch
    condition: success
  - from: s06-dependency-analysis
    to: s07-project-sync-and-dispatch
    condition: failure

  # -- s07 项目同步与模块调度（确认点）--
  #
  # "确认调度"走中继确认（自循环）：用户确认后 SubAgent 继续执行，
  # 根据用户选择产出 parallel_targets，然后上报 DONE（success）→ s08。
  # 这样可以确保 parallel_targets 在 DONE 之前被正确产出。
  - from: s07-project-sync-and-dispatch
    to: s08-dispatch-modules
    condition: success
  - from: s07-project-sync-and-dispatch
    to: s07-project-sync-and-dispatch
    condition: confirmed
    choice: "确认调度"
    max_loop: 3
  - from: s07-project-sync-and-dispatch
    to: s07-project-sync-and-dispatch
    condition: confirmed
    choice: "重新选择"
    max_loop: 3
  - from: s07-project-sync-and-dispatch
    to: s99-workflow-end
    condition: rejected
    choice: "终止工作流"
  - from: s07-project-sync-and-dispatch
    to: s99-workflow-end
    condition: loop_exceeded

  # -- s08 调度子工作流（非确认点）--
  # wfctl 按 parallel 声明为 s07 选定的每个模块创建独立 worktree，
  # 启动 module-design-pipeline@1.0.0 子工作流实例，等待全部完成后合并变更
  - from: s08-dispatch-modules
    to: s09-project-sync-check
    condition: success
  - from: s08-dispatch-modules
    to: s07-project-sync-and-dispatch
    condition: failure

  # -- s09 项目级同步矛盾检查（确认点）--
  # 用户审阅聚合冲突报告后，选择后续方向：
  #   "修改技术栈" → s02（回边，级联重置 s02–s08，重新选型）
  #   "调整项目结构" → s04（回边，级联重置 s04–s08，重新设计结构）
  #   "调整模块边界" → s05（回边，级联重置 s05–s08，重新拆解）
  #   "继续处理其他模块" → s07（回边，级联重置 s07–s08，选择下一批模块）
  #   "接受差异" → s99（结束）
  #   "终止工作流" → s99（结束）
  #   "放弃" → s99（结束）
  - from: s09-project-sync-check
    to: s02-architecture-selection
    condition: confirmed
    choice: "修改技术栈"
    max_loop: 3
    loop_counter_stage: "s09-project-sync-check"
    cascade_reset_until: "s09-project-sync-check"
  - from: s09-project-sync-check
    to: s04-project-structure-design
    condition: confirmed
    choice: "调整项目结构"
    max_loop: 3
    loop_counter_stage: "s09-project-sync-check"
    cascade_reset_until: "s09-project-sync-check"
  - from: s09-project-sync-check
    to: s05-module-breakdown
    condition: confirmed
    choice: "调整模块边界"
    max_loop: 3
    loop_counter_stage: "s09-project-sync-check"
    cascade_reset_until: "s09-project-sync-check"
  - from: s09-project-sync-check
    to: s07-project-sync-and-dispatch
    condition: confirmed
    choice: "继续处理其他模块"
    max_loop: 3
    loop_counter_stage: "s09-project-sync-check"
    cascade_reset_until: "s09-project-sync-check"
  - from: s09-project-sync-check
    to: s99-workflow-end
    condition: confirmed
    choice: "接受差异"
  - from: s09-project-sync-check
    to: s99-workflow-end
    condition: confirmed
    choice: "终止工作流"
  - from: s09-project-sync-check
    to: s99-workflow-end
    condition: rejected
    choice: "放弃"
  - from: s09-project-sync-check
    to: s99-workflow-end
    condition: loop_exceeded
