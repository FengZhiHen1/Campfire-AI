schema_version: "3.0.0"
workflow_id: "module-design-pipeline"
version: "1.1.0"
max_parallel_agents: 1
anchor_prefix: "wf"

stages:
  # ==================== 虚拟起止 ====================

  - stage_id: s00-workflow-start
    name: "工作流启动"

  - stage_id: s99-workflow-end
    name: "工作流终止"

  # ==================== 阶段一：存量检测与增量路径判定（s01）====================

  - stage_id: s01-detect-existing-artifacts
    name: "存量检测与增量路径判定"
    skill_id: existing-artifact-detector
    mandatory: true
    retry: 1
    model: light

  # ==================== 增量路径：逆向工程（s02-re，触发条件 code_only）====================

  - stage_id: s02-reverse-engineer-intent
    name: "逆向推导意图与规格"
    skill_id: code-reverse-engineering-writer
    mandatory: true
    retry: 0
    model: light

  # ==================== 增量路径：差异对比（s02-diff，触发条件 both_exist）====================

  - stage_id: s02-diff-and-update
    name: "差异对比与增量更新"
    skill_id: design-code-diff-updater
    mandatory: true
    retry: 0
    model: light

  # ==================== 阶段二：意图编写（s03）====================
  # v1.1.0：合并 s03（澄清+授权）与 s04（生成+冻结）为单一 Stage
  # 确认点下沉为 Skill 内部 AskUserQuestion + continue 循环

  - stage_id: s03-intent-write-and-freeze
    name: "意图编写与冻结"
    skill_id: module-intent-writer
    mandatory: true
    retry: 0
    model: light

  # ==================== 阶段三：规格编写（s05-s09）====================

  - stage_id: s05-spec-prepare
    name: "材料准备"
    skill_id: module-spec-writer
    mandatory: true
    retry: 1
    model: light

  - stage_id: s06-spec-research
    name: "技术决策预研"
    skill_id: spec-researcher
    mandatory: true
    retry: 1
    model: light

  - stage_id: s07-spec-design-doc
    name: "生成设计文档"
    skill_id: module-spec-writer
    mandatory: true
    retry: 0
    model: light

  - stage_id: s08-contract-harmonize
    name: "契约协调"
    skill_id: contract-harmonizer
    mandatory: true
    retry: 1
    model: light

  - stage_id: s09-spec-final
    name: "最终规格输出"
    skill_id: module-spec-writer
    mandatory: true
    retry: 0
    model: light

  # ==================== 阶段四：同步上报与收尾（s10）====================

  - stage_id: s10-module-sync-report
    name: "模块级同步矛盾上报"
    skill_id: module-sync-reporter
    mandatory: true
    retry: 0
    model: light

# ==================== 流转边 ====================

edges:
  # -- s00 起始 --
  - from: s00-workflow-start
    to: s01-detect-existing-artifacts
    condition: always

  # -- s01 存量检测与增量路径判定（非确认点，SubAgent 自主路由）--
  # 六种场景分别路由到不同的下游 stage：
  #   full_design                    → s03（意图编写与冻结→规格编写）
  #   design_docs_only_intent_draft  → s03（续写意图，跳过已完成部分）
  #   design_docs_only_intent_frozen → s05（跳过意图，从规格开始）
  #   design_docs_only_all_complete  → s10（仅上报同步状态）
  #   code_only                      → s02-re（从代码逆向推导）
  #   both_exist                     → s02-diff（差异对比增量更新）
  - from: s01-detect-existing-artifacts
    to: s03-intent-write-and-freeze
    condition: success
    choice: "full_design"
  - from: s01-detect-existing-artifacts
    to: s03-intent-write-and-freeze
    condition: success
    choice: "design_docs_only_intent_draft"
  - from: s01-detect-existing-artifacts
    to: s05-spec-prepare
    condition: success
    choice: "design_docs_only_intent_frozen"
  - from: s01-detect-existing-artifacts
    to: s10-module-sync-report
    condition: success
    choice: "design_docs_only_all_complete"
  - from: s01-detect-existing-artifacts
    to: s02-reverse-engineer-intent
    condition: success
    choice: "code_only"
  - from: s01-detect-existing-artifacts
    to: s02-diff-and-update
    condition: success
    choice: "both_exist"
  - from: s01-detect-existing-artifacts
    to: s10-module-sync-report
    condition: failure

  # ==================== 全流程路径：full_design / intent_draft ====================

  # -- s03 意图编写与冻结（确认点下沉至 Skill 内部）--
  # Skill 内部流程：意图澄清 → 书写授权 → 生成意图文档 → 冻结授权
  # 循环（继续澄清 / 重新澄清）通过 Skill 内部 AskUserQuestion + continue 实现
  - from: s03-intent-write-and-freeze
    to: s05-spec-prepare
    condition: success
    choice: "确认冻结"
  - from: s03-intent-write-and-freeze
    to: s10-module-sync-report
    condition: success
    choice: "放弃模块"
  - from: s03-intent-write-and-freeze
    to: s10-module-sync-report
    condition: loop_exceeded

  # ==================== 规格阶段（全流程 / intent_frozen 路径共享）====================

  # -- s05 材料准备（非确认点）--
  - from: s05-spec-prepare
    to: s06-spec-research
    condition: success
  - from: s05-spec-prepare
    to: s10-module-sync-report
    condition: failure

  # -- s06 技术决策预研（非确认点）--
  - from: s06-spec-research
    to: s07-spec-design-doc
    condition: success
  - from: s06-spec-research
    to: s10-module-sync-report
    condition: failure

  # -- s07 生成设计文档（确认点）--
  - from: s07-spec-design-doc
    to: s08-contract-harmonize
    condition: success
    choice: "通过"
  - from: s07-spec-design-doc
    to: s07-spec-design-doc
    condition: success
    choice: "继续完善"
    max_loop: 3
  - from: s07-spec-design-doc
    to: s10-module-sync-report
    condition: success
    choice: "放弃模块"
  - from: s07-spec-design-doc
    to: s10-module-sync-report
    condition: loop_exceeded

  # -- s08 契约协调（非确认点）--
  - from: s08-contract-harmonize
    to: s09-spec-final
    condition: success
  - from: s08-contract-harmonize
    to: s10-module-sync-report
    condition: failure

  # -- s09 最终规格输出（确认点）--
  - from: s09-spec-final
    to: s10-module-sync-report
    condition: success
    choice: "输出规格"
  - from: s09-spec-final
    to: s09-spec-final
    condition: success
    choice: "继续完善"
    max_loop: 3
  - from: s09-spec-final
    to: s10-module-sync-report
    condition: success
    choice: "放弃模块"
  - from: s09-spec-final
    to: s10-module-sync-report
    condition: loop_exceeded

  # ==================== 逆向工程路径：code_only ====================

  # -- s02-re 逆向推导意图与规格（确认点）--
  # 完成后汇入 s03 冻结逆推结果（v1.1.0：由 s04 改为 s03）
  - from: s02-reverse-engineer-intent
    to: s03-intent-write-and-freeze
    condition: success
    choice: "确认逆推结果"
  - from: s02-reverse-engineer-intent
    to: s02-reverse-engineer-intent
    condition: success
    choice: "继续完善"
    max_loop: 3
  - from: s02-reverse-engineer-intent
    to: s10-module-sync-report
    condition: success
    choice: "放弃模块"
  - from: s02-reverse-engineer-intent
    to: s10-module-sync-report
    condition: loop_exceeded

  # code_only 路径下 s03 冻结后进入 s08 契约协调（跳过 s05-s07 规格准备/预研/设计文档）
  - from: s03-intent-write-and-freeze
    to: s08-contract-harmonize
    condition: success
    choice: "冻结并进入契约协调"

  # ==================== 差异对比路径：both_exist ====================

  # -- s02-diff 差异对比与增量更新（确认点）--
  # 完成后跳过意图编写和规格准备阶段，直接进入 s09 最终规格输出
  - from: s02-diff-and-update
    to: s09-spec-final
    condition: success
    choice: "确认更新"
  - from: s02-diff-and-update
    to: s02-diff-and-update
    condition: success
    choice: "继续完善"
    max_loop: 3
  - from: s02-diff-and-update
    to: s10-module-sync-report
    condition: success
    choice: "放弃模块"
  - from: s02-diff-and-update
    to: s10-module-sync-report
    condition: loop_exceeded

  # ==================== 收尾 ====================

  # -- s10 模块级同步矛盾上报（非确认点）--
  - from: s10-module-sync-report
    to: s99-workflow-end
    condition: always
