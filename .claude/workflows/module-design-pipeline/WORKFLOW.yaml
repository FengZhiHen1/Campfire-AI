schema_version: "3.0.0"
workflow_id: "module-design-pipeline"
version: "1.0.0"
max_parallel_agents: 1
anchor_prefix: "wf"

stages:
  # ==================== 虚拟起止 ====================

  - stage_id: s00-workflow-start
    name: "工作流启动"

  - stage_id: s99-workflow-end
    name: "工作流终止"

  # ==================== 阶段一：存量检测与增量路径判定（s01）====================

  - stage_id: s01-detect-existing-artifacts
    name: "存量检测与增量路径判定"
    skill_id: existing-artifact-detector
    mandatory: true
    confirmation_point: false
    retry: 1
    model: light

  # ==================== 增量路径：逆向工程（s02-re，触发条件 code_only）====================

  - stage_id: s02-reverse-engineer-intent
    name: "逆向推导意图与规格"
    skill_id: code-reverse-engineering-writer
    mandatory: true
    confirmation_point: true
    retry: 0

  # ==================== 增量路径：差异对比（s02-diff，触发条件 both_exist）====================

  - stage_id: s02-diff-and-update
    name: "差异对比与增量更新"
    skill_id: design-code-diff-updater
    mandatory: true
    confirmation_point: true
    retry: 0

  # ==================== 阶段二：意图编写（s03-s06）====================

  - stage_id: s03-intent-clarify
    name: "意图澄清"
    skill_id: module-intent-writer
    mandatory: true
    confirmation_point: true
    retry: 0

  - stage_id: s04-intent-authorize
    name: "书写授权"
    skill_id: module-intent-writer
    mandatory: true
    confirmation_point: true
    retry: 0

  - stage_id: s05-intent-generate
    name: "生成意图文档"
    skill_id: module-intent-writer
    mandatory: true
    confirmation_point: false
    retry: 1

  - stage_id: s06-intent-freeze
    name: "冻结授权"
    skill_id: module-intent-writer
    mandatory: true
    confirmation_point: true
    retry: 0

  # ==================== 阶段三：规格编写（s07-s11）====================

  - stage_id: s07-spec-prepare
    name: "材料准备"
    skill_id: module-spec-writer
    mandatory: true
    confirmation_point: false
    retry: 1
    model: light

  - stage_id: s08-spec-research
    name: "技术决策预研"
    skill_id: spec-researcher
    mandatory: true
    confirmation_point: false
    retry: 1
    model: light

  - stage_id: s09-spec-design-doc
    name: "生成设计文档"
    skill_id: module-spec-writer
    mandatory: true
    confirmation_point: true
    retry: 0

  - stage_id: s10-contract-harmonize
    name: "契约协调"
    skill_id: contract-harmonizer
    mandatory: true
    confirmation_point: false
    retry: 1

  - stage_id: s11-spec-final
    name: "最终规格输出"
    skill_id: module-spec-writer
    mandatory: true
    confirmation_point: true
    retry: 0

  # ==================== 阶段四：同步上报与收尾（s12）====================

  - stage_id: s12-module-sync-report
    name: "模块级同步矛盾上报"
    skill_id: module-sync-reporter
    mandatory: true
    confirmation_point: false
    retry: 0
    model: light

# ==================== 流转边 ====================

edges:
  # -- s00 起始 --
  - from: s00-workflow-start
    to: s01-detect-existing-artifacts
    condition: always

  # -- s01 存量检测与增量路径判定（非确认点，SubAgent 自主路由）--
  # ⚠️ 核心路由节点：扫描存量制品 → 判定增量场景 → DONE --choice
  # 六种场景分别路由到不同的下游 stage：
  #   full_design                    → s03（完整意图+规格）
  #   design_docs_only_intent_draft  → s03（续写意图，跳过已完成部分）
  #   design_docs_only_intent_frozen → s07（跳过意图，从规格开始）
  #   design_docs_only_all_complete  → s12（仅上报同步状态）
  #   code_only                      → s02-re（从代码逆向推导）
  #   both_exist                     → s02-diff（差异对比增量更新）
  - from: s01-detect-existing-artifacts
    to: s03-intent-clarify
    condition: success
    choice: "full_design"
  - from: s01-detect-existing-artifacts
    to: s03-intent-clarify
    condition: success
    choice: "design_docs_only_intent_draft"
  - from: s01-detect-existing-artifacts
    to: s07-spec-prepare
    condition: success
    choice: "design_docs_only_intent_frozen"
  - from: s01-detect-existing-artifacts
    to: s12-module-sync-report
    condition: success
    choice: "design_docs_only_all_complete"
  - from: s01-detect-existing-artifacts
    to: s02-reverse-engineer-intent
    condition: success
    choice: "code_only"
  - from: s01-detect-existing-artifacts
    to: s02-diff-and-update
    condition: success
    choice: "both_exist"
  - from: s01-detect-existing-artifacts
    to: s12-module-sync-report
    condition: failure

  # ==================== 全流程路径：full_design / intent_draft ====================

  # -- s03 意图澄清（确认点）--
  - from: s03-intent-clarify
    to: s04-intent-authorize
    condition: confirmed
    choice: "通过"
  - from: s03-intent-clarify
    to: s03-intent-clarify
    condition: confirmed
    choice: "继续澄清"
    max_loop: 5
  - from: s03-intent-clarify
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s03-intent-clarify
    to: s12-module-sync-report
    condition: loop_exceeded

  # -- s04 书写授权（确认点）--
  - from: s04-intent-authorize
    to: s05-intent-generate
    condition: confirmed
    choice: "授权"
  - from: s04-intent-authorize
    to: s03-intent-clarify
    condition: rejected
    choice: "继续澄清"
    max_loop: 3
  - from: s04-intent-authorize
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s04-intent-authorize
    to: s12-module-sync-report
    condition: loop_exceeded

  # -- s05 生成意图文档（非确认点）--
  - from: s05-intent-generate
    to: s06-intent-freeze
    condition: success
  - from: s05-intent-generate
    to: s12-module-sync-report
    condition: failure

  # -- s06 冻结授权（确认点）--
  - from: s06-intent-freeze
    to: s07-spec-prepare
    condition: confirmed
    choice: "确认冻结"
  - from: s06-intent-freeze
    to: s03-intent-clarify
    condition: rejected
    choice: "重新澄清"
    max_loop: 3
  - from: s06-intent-freeze
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s06-intent-freeze
    to: s12-module-sync-report
    condition: loop_exceeded

  # ==================== 规格阶段（全流程 / intent_frozen 路径共享）====================

  # -- s07 材料准备（非确认点）--
  - from: s07-spec-prepare
    to: s08-spec-research
    condition: success
  - from: s07-spec-prepare
    to: s12-module-sync-report
    condition: failure

  # -- s08 技术决策预研（非确认点）--
  - from: s08-spec-research
    to: s09-spec-design-doc
    condition: success
  - from: s08-spec-research
    to: s12-module-sync-report
    condition: failure

  # -- s09 生成设计文档（确认点）--
  - from: s09-spec-design-doc
    to: s10-contract-harmonize
    condition: confirmed
    choice: "通过"
  - from: s09-spec-design-doc
    to: s09-spec-design-doc
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s09-spec-design-doc
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s09-spec-design-doc
    to: s12-module-sync-report
    condition: loop_exceeded

  # -- s10 契约协调（非确认点）--
  - from: s10-contract-harmonize
    to: s11-spec-final
    condition: success
  - from: s10-contract-harmonize
    to: s12-module-sync-report
    condition: failure

  # -- s11 最终规格输出（确认点）--
  - from: s11-spec-final
    to: s12-module-sync-report
    condition: confirmed
    choice: "输出规格"
  - from: s11-spec-final
    to: s11-spec-final
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s11-spec-final
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s11-spec-final
    to: s12-module-sync-report
    condition: loop_exceeded

  # ==================== 逆向工程路径：code_only ====================

  # -- s02-re 逆向推导意图与规格（确认点）--
  # 完成后跳过 s03-s05（意图澄清/授权/生成），直接进入 s06（冻结）
  - from: s02-reverse-engineer-intent
    to: s06-intent-freeze
    condition: confirmed
    choice: "确认逆推结果"
  - from: s02-reverse-engineer-intent
    to: s02-reverse-engineer-intent
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s02-reverse-engineer-intent
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s02-reverse-engineer-intent
    to: s12-module-sync-report
    condition: loop_exceeded

  # code_only 路径下 s06 冻结后进入 s10 契约协调（跳过 s07-s09 规格准备/预研/设计文档）
  # 此边由 s06 提供额外的 choice 路由实现：
  #   当 upstream 是 s02-re 时，s06 confirmed → s10-contract-harmonize
  #   当 upstream 是 s03/s04/s05 时，s06 confirmed → s07-spec-prepare（已在上面定义）
  - from: s06-intent-freeze
    to: s10-contract-harmonize
    condition: confirmed
    choice: "冻结并进入契约协调"

  # ==================== 差异对比路径：both_exist ====================

  # -- s02-diff 差异对比与增量更新（确认点）--
  # 完成后跳过意图编写和规格准备阶段，直接进入 s11 最终规格输出
  - from: s02-diff-and-update
    to: s11-spec-final
    condition: confirmed
    choice: "确认更新"
  - from: s02-diff-and-update
    to: s02-diff-and-update
    condition: confirmed
    choice: "继续完善"
    max_loop: 3
  - from: s02-diff-and-update
    to: s12-module-sync-report
    condition: rejected
    choice: "放弃模块"
  - from: s02-diff-and-update
    to: s12-module-sync-report
    condition: loop_exceeded

  # ==================== 收尾 ====================

  # -- s12 模块级同步矛盾上报（非确认点）--
  - from: s12-module-sync-report
    to: s99-workflow-end
    condition: always
