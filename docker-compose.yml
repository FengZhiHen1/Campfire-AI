# ============================================================
#  (Campfire-AI) — local development infrastructure orchestration
# Start: docker compose up -d
# Stop:  docker compose down
#
# dev environment only orchestrates 3 data containers (postgres/redis/minio).
# api-server, worker, and nginx run directly on the host.
# ============================================================

services:
  # --- PostgreSQL 17 ---
  postgres:
    image: pgvector/pgvector:pg17
    container_name: campfire-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: campfire
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campfire"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    container_name: campfire-redis
    restart: unless-stopped
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- MinIO ---
  minio:
    image: minio/minio
    container_name: campfire-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      # MinIO Docker 镜像使用 MINIO_ROOT_USER/PASSWORD，
      # 映射 .env 中的 MINIO_ACCESS_KEY/SECRET_KEY
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata_dev:
  redis_data_dev:
  minio_data_dev:
