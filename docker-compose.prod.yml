# ============================================================
#  (Campfire-AI) — production environment orchestration
# Start: docker compose -f docker-compose.prod.yml up -d
# Stop:  docker compose -f docker-compose.prod.yml down
# ============================================================

services:
  # --- PostgreSQL 17 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg17
    container_name: campfire-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campfire"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file: .env
    environment:
      POSTGRES_USER: campfire
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - campfire-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    container_name: campfire-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file: .env
    volumes:
      - redis_data:/data
    networks:
      - campfire-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- MinIO ---
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: campfire-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file: .env
    volumes:
      - minio_data:/data
    networks:
      - campfire-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- Database migration (one-shot service) ---
  migration:
    container_name: campfire-migration
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    networks:
      - campfire-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- FastAPI API Server ---
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile.api
    image: campfire-api-server:${VERSION_TAG:-latest}
    container_name: campfire-api-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ./scripts/seed.py:/app/scripts/seed.py:ro
    networks:
      - campfire-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- Worker ---
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.worker
    image: campfire-worker:${VERSION_TAG:-latest}
    container_name: campfire-worker
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -m worker.main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    networks:
      - campfire-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:1.26-alpine
    container_name: campfire-nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./infrastructure/nginx/ssl/:/etc/nginx/ssl/:ro
      - ./apps/react-web/dist:/usr/share/nginx/html/h5:ro
    networks:
      - campfire-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  pgdata:
  redis_data:
  minio_data:

networks:
  campfire-net:
    driver: bridge
