<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>录入案例叙事 - Campfire AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#50c594",
                        "primary-fixed-dim": "#ffb95f",
                        "on-background": "#1f1b17",
                        "secondary": "#505f76",
                        "tertiary": "#006c4a",
                        "on-surface": "#1f1b17",
                        "on-surface-variant": "#534434",
                        "on-secondary": "#ffffff",
                        "outline": "#867461",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#613b00",
                        "background": "#fff8f5",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-fixed": "#85f8c4",
                        "surface-container-high": "#f0e6e0",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#653e00",
                        "surface-container": "#f6ece6",
                        "surface-variant": "#eae1da",
                        "on-primary-fixed": "#2a1700",
                        "surface-tint": "#855300",
                        "on-secondary-fixed": "#0b1c30",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#54647a",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#d8c3ad",
                        "primary-fixed": "#ffddb8",
                        "secondary-fixed": "#d3e4fe",
                        "surface": "#fff8f5",
                        "on-tertiary-fixed": "#002114",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#d0e1fb",
                        "inverse-on-surface": "#f9efe8",
                        "primary-container": "#f59e0b",
                        "primary": "#855300",
                        "on-tertiary-container": "#004e35",
                        "surface-bright": "#fff8f5",
                        "on-tertiary-fixed-variant": "#005137",
                        "inverse-surface": "#342f2b",
                        "surface-dim": "#e2d8d2",
                        "surface-container-low": "#fcf2eb",
                        "inverse-primary": "#ffb95f",
                        "tertiary-fixed-dim": "#68dba9",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#eae1da",
                        "secondary-fixed-dim": "#b7c8e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "lg": "24px",
                        "sm": "8px",
                        "gutter": "16px",
                        "base": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "headline-md": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "footnote": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "headline-lg": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "body-md": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "body-lg": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "21px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "footnote": ["11px", { "lineHeight": "15px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "38px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "32px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: var(--color-surface-dim);
            border-radius: 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24 flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-surface shadow-sm flex items-center justify-between px-margin-mobile h-16 transition-colors">
<button aria-label="Cancel" class="text-on-surface-variant hover:bg-surface-container transition-colors p-2 rounded-full active:opacity-80 flex items-center">
<span class="font-label-md text-label-md text-primary">取消</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-bold">录入案例叙事</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pt-lg pb-xl max-w-3xl mx-auto w-full flex flex-col gap-lg">
<!-- Case Title Section -->
<section class="flex flex-col gap-sm">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1 font-semibold" for="case-title">
                    叙事标题 <span class="text-error">*</span>
</label>
<span class="font-footnote text-footnote text-on-surface-variant">0/100</span>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-[0_2px_12px_rgba(28,25,23,0.03)]" id="case-title" placeholder="请输入案例标题，如：ASD 商场感官过载干预案例" type="text"/>
</div>
</section>
<!-- Source Type Section -->
<section class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface font-semibold">来源类型</label>
<div class="flex gap-4">
<label class="cursor-pointer flex items-center gap-2 group">
<input checked="" class="peer sr-only" name="source_type" type="radio" value="expert"/>
<div class="px-4 py-2 rounded-full border border-primary peer-checked:bg-primary-container peer-checked:border-primary-container peer-checked:text-on-primary-container text-on-surface-variant bg-surface transition-colors">
<span class="font-label-md text-label-md">专家撰写</span>
</div>
</label>
<label class="cursor-pointer flex items-center gap-2 group">
<input class="peer sr-only" name="source_type" type="radio" value="family"/>
<div class="px-4 py-2 rounded-full border border-outline-variant peer-checked:bg-primary-container peer-checked:border-primary-container peer-checked:text-on-primary-container text-on-surface-variant bg-surface transition-colors hover:bg-surface-container">
<span class="font-label-md text-label-md">家属分享</span>
</div>
</label>
</div>
</section>
<!-- Writing Tips Section -->
<section class="bg-surface-container rounded-xl p-4 shadow-[0_4px_24px_rgba(28,25,23,0.06)] flex flex-col gap-3">
<div class="flex items-center justify-between cursor-pointer" onclick="document.getElementById('tips-content').classList.toggle('hidden'); this.querySelector('.chevron').classList.toggle('rotate-180')">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[20px]" data-weight="fill">lightbulb</span>
<span class="font-label-md text-label-md font-bold">写作提示</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant chevron transition-transform duration-200">expand_more</span>
</div>
<div class="flex flex-col gap-2 pt-1 transition-all" id="tips-content">
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-tertiary-container text-[18px] mt-[3px]">check_circle</span>
<p class="font-body-md text-label-md text-on-surface-variant leading-relaxed">详细描述前因：引发行为的具体环境或事件是什么？</p>
</div>
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-tertiary-container text-[18px] mt-[3px]">check_circle</span>
<p class="font-body-md text-label-md text-on-surface-variant leading-relaxed">客观记录行为：孩子具体的表现（如：大声尖叫持续5分钟，双手捂耳）。</p>
</div>
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-tertiary-container text-[18px] mt-[3px]">check_circle</span>
<p class="font-body-md text-label-md text-on-surface-variant leading-relaxed">说明干预步骤及结果：采取了哪些行动，最终效果如何？</p>
</div>
</div>
</section>
<!-- Narrative Body Section -->
<section class="flex flex-col gap-sm flex-grow">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1 font-semibold" for="case-body">
                叙事正文 <span class="text-error">*</span>
</label>
<div class="relative flex-grow flex flex-col">
<textarea class="w-full flex-grow min-h-[300px] bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 font-body-md text-body-lg text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-[0_4px_24px_rgba(28,25,23,0.06)] resize-y leading-relaxed" id="case-body" placeholder="【描述孩子情况】
年龄、诊断倾向、当下的情绪基调...

【行为表现】
具体的动作、声音、持续时间...

【干预动作】
你做了什么？环境做了哪些调整？...

【结果效果】
最终状态如何？有何反思？..."></textarea>
<div class="absolute bottom-4 right-4 flex items-center gap-2 bg-surface/80 backdrop-blur-sm px-2 py-1 rounded-md">
<span class="font-footnote text-footnote text-on-surface-variant">0/5000</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar (Not BottomNavBar from JSON as per rules for transactional pages, but fulfilling the requirements) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant/20 px-margin-mobile py-4 pb-safe z-50 shadow-[0_-8px_32px_rgba(28,25,23,0.05)]">
<div class="max-w-3xl mx-auto flex items-center gap-4">
<button class="flex-1 bg-surface-variant text-on-surface-variant hover:bg-surface-container-highest font-label-md text-label-md font-semibold py-3.5 rounded-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span>
                保存草稿
            </button>
<button class="flex-1 bg-primary text-on-primary hover:opacity-90 font-label-md text-label-md font-bold py-3.5 rounded-xl shadow-[0_4px_16px_rgba(133,83,0,0.3)] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">auto_awesome</span>
                提取卡片
            </button>
</div>
</div>
<script>
        // Simple character count logic for demonstration
        const titleInput = document.getElementById('case-title');
        const titleCounter = titleInput.parentElement.previousElementSibling.querySelector('.font-footnote');
        
        titleInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            titleCounter.textContent = `${length}/100`;
            if(length > 100) titleCounter.classList.add('text-error');
            else titleCounter.classList.remove('text-error');
        });

        const bodyInput = document.getElementById('case-body');
        const bodyCounter = bodyInput.nextElementSibling.querySelector('.font-footnote');
        
        bodyInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            bodyCounter.textContent = `${length}/5000`;
            if(length > 5000) bodyCounter.classList.add('text-error');
            else bodyCounter.classList.remove('text-error');
        });
    </script>
</body></html>
