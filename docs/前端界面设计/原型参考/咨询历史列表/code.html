<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>咨询历史 - The Trusted Ember</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#d0e1fb",
                        "tertiary-fixed": "#85f8c4",
                        "tertiary-fixed-dim": "#68dba9",
                        "surface-container-low": "#fcf2eb",
                        "on-surface-variant": "#534434",
                        "surface-container-high": "#f0e6e0",
                        "surface-dim": "#e2d8d2",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#342f2b",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#eae1da",
                        "surface-tint": "#855300",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#ffb95f",
                        "surface": "#fff8f5",
                        "primary-fixed": "#ffddb8",
                        "outline": "#867461",
                        "tertiary": "#006c4a",
                        "outline-variant": "#d8c3ad",
                        "primary-container": "#f59e0b",
                        "on-tertiary-fixed": "#002114",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-tertiary-container": "#004e35",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#54647a",
                        "on-primary-fixed-variant": "#653e00",
                        "on-secondary-fixed": "#0b1c30",
                        "on-primary-container": "#613b00",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#2a1700",
                        "surface-container": "#f6ece6",
                        "primary": "#855300",
                        "on-error-container": "#93000a",
                        "on-background": "#1f1b17",
                        "secondary-fixed": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "background": "#fff8f5",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f9efe8",
                        "surface-bright": "#fff8f5",
                        "on-secondary-fixed-variant": "#38485d",
                        "secondary": "#505f76",
                        "on-tertiary-fixed-variant": "#005137",
                        "tertiary-container": "#50c594",
                        "surface-variant": "#eae1da",
                        "primary-fixed-dim": "#ffb95f",
                        "on-surface": "#1f1b17"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "xl": "32px",
                        "margin-desktop": "24px",
                        "lg": "24px",
                        "base": "8px",
                        "md": "16px",
                        "xs": "4px",
                        "gutter": "16px",
                        "sm": "8px",
                        "safe": "env(safe-area-inset-bottom)"
                    },
                    "fontFamily": {
                        "headline-lg": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "body-lg": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "headline-md": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "body-md": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "footnote": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"],
                        "label-md": ["system-ui", "-apple-system", "'PingFang SC'", "'Noto Sans SC'", "'Helvetica Neue'", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "38px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "32px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "footnote": ["11px", { "lineHeight": "15px", "letterSpacing": "0px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "21px", "letterSpacing": "0px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #FDF8F3; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .swipe-revealed { transform: translateX(-80px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background font-body-md bg-[#FDF8F3] min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface dark:bg-surface-dim shadow-[0_4px_24px_rgba(28,25,23,0.06)] z-50 flex items-center justify-between px-margin-mobile h-14 transition-colors">
<button class="text-on-surface-variant hover:bg-surface-variant/50 transition-colors active:scale-95 duration-150 p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-semibold text-primary">Consultation History</h1>
<button class="text-on-surface-variant hover:bg-surface-variant/50 transition-colors active:scale-95 duration-150 p-2 -mr-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
</header>
<!-- Main Content -->
<main class="pt-[80px] px-margin-mobile">
<!-- Sticky Search -->
<div class="sticky top-[64px] z-40 bg-[#FDF8F3] pb-4 pt-2 -mx-margin-mobile px-margin-mobile">
<div class="relative flex items-center w-full h-12 rounded-xl bg-surface-container-high overflow-hidden shadow-[0_2px_8px_rgba(28,25,23,0.04)]">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">search</span>
<input class="w-full h-full bg-transparent border-none focus:ring-0 pl-12 pr-4 text-body-md text-on-surface placeholder:text-on-surface-variant/60 font-body-md" placeholder="搜索历史咨询记录..." type="text"/>
</div>
</div>
<!-- Consultation List -->
<div class="flex flex-col gap-4 mt-2">
<!-- Card 1: High Trust -->
<div class="relative w-full rounded-xl overflow-hidden shadow-[0_4px_24px_rgba(28,25,23,0.06)] bg-surface active:scale-[0.98] transition-transform duration-200">
<div class="p-4 flex flex-col gap-3 relative z-10 bg-surface w-full">
<div class="flex justify-between items-start">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
<span class="font-label-md text-label-md text-on-surface">轻度</span>
<span class="font-footnote text-footnote text-on-surface-variant ml-2">今天 14:32</span>
</div>
<div class="bg-tertiary text-on-tertiary px-2 py-0.5 rounded-full flex items-center gap-1 shadow-sm">
<span class="font-footnote text-footnote font-medium">高可信</span>
<span class="text-[8px] leading-none">●</span>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<span class="bg-primary-container/20 text-primary-container px-2 py-0.5 rounded text-xs font-medium">自伤行为</span>
</div>
<p class="font-body-md text-body-md text-on-surface leading-relaxed">孩子在商场突然情绪崩溃...</p>
</div>
</div>
</div>
<!-- Card 2: Medium Trust (Partial Swipe State) -->
<div class="relative w-full rounded-xl overflow-hidden shadow-[0_4px_24px_rgba(28,25,23,0.06)] bg-surface">
<!-- Delete Action Background -->
<div class="absolute inset-0 bg-error flex justify-end items-center px-6">
<button class="text-on-error font-label-md text-label-md flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">delete</span>
                        删除
                    </button>
</div>
<!-- Swiped Content -->
<div class="p-4 flex flex-col gap-3 relative z-10 bg-surface w-full transition-transform duration-300 swipe-revealed shadow-[-4px_0_12px_rgba(28,25,23,0.05)] border-r border-outline/10">
<div class="flex justify-between items-start">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<span class="font-label-md text-label-md text-on-surface">中度</span>
<span class="font-footnote text-footnote text-on-surface-variant ml-2">昨天 09:15</span>
</div>
<div class="bg-primary-container text-on-primary-container px-2 py-0.5 rounded-full flex items-center gap-1 shadow-sm">
<span class="font-footnote text-footnote font-medium">中可信</span>
<span class="text-[8px] leading-none text-on-primary-container/70">●</span>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<span class="bg-primary-container/20 text-primary-container px-2 py-0.5 rounded text-xs font-medium">攻击行为</span>
</div>
<p class="font-body-md text-body-md text-on-surface leading-relaxed">拒绝服药并试图摔东西...</p>
</div>
</div>
</div>
<!-- Card 3: Low Trust -->
<div class="relative w-full rounded-xl overflow-hidden shadow-[0_4px_24px_rgba(28,25,23,0.06)] bg-surface active:scale-[0.98] transition-transform duration-200">
<div class="p-4 flex flex-col gap-3 relative z-10 bg-surface w-full">
<div class="flex justify-between items-start">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-error"></div>
<span class="font-label-md text-label-md text-on-surface">重度</span>
<span class="font-footnote text-footnote text-on-surface-variant ml-2">5月20日 22:48</span>
</div>
<div class="text-error flex items-center gap-1">
<span class="font-footnote text-footnote font-medium">需复核</span>
<span class="text-[8px] leading-none">●</span>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<span class="bg-error-container text-on-error-container px-2 py-0.5 rounded text-xs font-medium">用药相关</span>
</div>
<p class="font-body-md text-body-md text-on-surface leading-relaxed">误服过量药物...</p>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe h-20 bg-surface dark:bg-surface-dim border-t border-outline/15 shadow-[0_-4px_24px_rgba(28,25,23,0.06)] rounded-t-xl transition-all">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-container-high transition-all active:scale-90 duration-200 font-label-md text-label-md">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">emergency_share</span>
            Emergency
        </button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 hover:bg-surface-container-high transition-all active:scale-90 duration-200 font-label-md text-label-md shadow-sm">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">history</span>
            History
        </button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1 hover:bg-surface-container-high transition-all active:scale-90 duration-200 font-label-md text-label-md">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">person</span>
            Profile
        </button>
</nav>
<script>
        // Simple script to toggle the swipe state on the second card for demo purposes
        document.addEventListener('DOMContentLoaded', () => {
            const swipedCard = document.querySelector('.swipe-revealed');
            if(swipedCard) {
                swipedCard.addEventListener('click', function() {
                    this.classList.toggle('swipe-revealed');
                });
            }
        });
    </script>
</body></html>
