<script>
        document.getElementById('toggleNarrativeBtn').addEventListener('click', function() {
            const collapse = document.getElementById('narrativeCollapse');
            if (collapse.classList.contains('hidden')) {
                collapse.classList.remove('hidden');
                this.textContent = '收起';
            } else {
                collapse.classList.add('hidden');
                this.textContent = '原文';
            }
        });
    </script>
