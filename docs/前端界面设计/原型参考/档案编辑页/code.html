<!DOCTYPE html>

<html lang="zh-CN"><head>

                        "secondary": "#505f76",

                        "surface-dim": "#e2d8d2",

<style>
        body { background-color: #fff8f5; } /* Using surface/background token approximation */
        .safe-pb { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
        
        /* Custom form styling to match the brand */
        input[type="text"], input[type="date"], select {
            background-color: theme('colors.surface-container-lowest');
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface');
            transition: all 0.2s ease;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px theme('colors.primary-container');
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased safe-pb">
<!-- Top Navigation (Shared Component Style) -->
<header class="fixed top-0 w-full z-50 bg-surface h-16 flex justify-between items-center px-margin-mobile">
<button class="font-label-md text-label-md text-secondary hover:opacity-80 transition-opacity active:scale-95 px-2 py-1">
            取消
        </button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">编辑档案</h1>
<div class="flex items-center gap-2">
<button aria-label="保存" class="text-primary hover:opacity-80 transition-opacity active:scale-95 p-1 rounded-full bg-primary-container/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
<button aria-label="更多" class="text-secondary hover:opacity-80 transition-opacity active:scale-95 p-1">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="mt-16 px-margin-mobile pt-lg flex flex-col gap-xl">
<!-- Basic Info Section -->
<section class="flex flex-col gap-md">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">badge</span>
                基础信息
            </h2>
<div class="bg-surface-container-lowest rounded-xl p-md shadow-diffuse border border-outline-variant/30 flex flex-col items-center gap-lg">
<!-- Avatar -->
<div class="relative group cursor-pointer active:scale-95 transition-transform mt-sm">
<div class="w-24 h-24 rounded-full bg-surface-container-highest overflow-hidden border-2 border-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-secondary">person</span>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-on-primary rounded-full p-1.5 shadow-md border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">edit</span>
</div>
</div>
<!-- Form Fields -->
<div class="w-full flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center">
                            档案昵称 <span class="text-error ml-1">*</span>
</label>
<input class="w-full rounded-lg px-3 py-2 font-body-md text-body-md h-12" placeholder="请输入昵称" type="text" value="小明"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center">
                            出生日期 <span class="text-error ml-1">*</span>
</label>
<input class="w-full rounded-lg px-3 py-2 font-body-md text-body-md h-12 text-on-surface" type="date" value="2015-06-12"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center">
                            诊断类型 <span class="text-error ml-1">*</span>
</label>
<div class="relative">
<select class="w-full rounded-lg px-3 py-2 font-body-md text-body-md h-12 appearance-none pr-10">
<option>自闭症谱系障碍 (ASD)</option>
<option>ADHD</option>
<option>发育迟缓</option>
<option>其他</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center">
                            主要行为类型 <span class="text-error ml-1">*</span>
</label>
<div class="relative">
<select class="w-full rounded-lg px-3 py-2 font-body-md text-body-md h-12 appearance-none pr-10">
<option>情绪调节困难</option>
<option>刻板行为</option>
<option>社交退缩</option>
<option>攻击性行为</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">expand_more</span>
</div>
</div>
</div>
</div>
</section>
<!-- Tags Section -->
<section class="flex flex-col gap-md">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">sell</span>
                标签体系
            </h2>
<div class="bg-surface-container-lowest rounded-xl p-md shadow-diffuse border border-outline-variant/30 flex flex-col gap-lg">
<!-- Preset Tags -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant">预设标签</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-1.5 rounded-full font-label-md text-label-md bg-primary-container text-on-primary-container border border-primary/20 transition-colors active:scale-95">感官敏感</button>
<button class="px-4 py-1.5 rounded-full font-label-md text-label-md bg-surface-container text-on-surface-variant border border-outline-variant hover:bg-surface-variant transition-colors active:scale-95">睡眠障碍</button>
<button class="px-4 py-1.5 rounded-full font-label-md text-label-md bg-primary-container text-on-primary-container border border-primary/20 transition-colors active:scale-95">社交回避</button>
<button class="px-4 py-1.5 rounded-full font-label-md text-label-md bg-surface-container text-on-surface-variant border border-outline-variant hover:bg-surface-variant transition-colors active:scale-95">挑食</button>
<button class="px-4 py-1.5 rounded-full font-label-md text-label-md bg-surface-container text-on-surface-variant border border-outline-variant hover:bg-surface-variant transition-colors active:scale-95">转换困难</button>
</div>
</div>
<hr class="border-outline-variant/30"/>
<!-- Custom Tags -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant">自定义标签</label>
<div class="flex gap-2">
<input class="flex-1 rounded-lg px-3 py-2 font-body-md text-body-md h-12" placeholder="输入新标签..." type="text"/>
<button class="h-12 px-4 rounded-lg bg-primary text-on-primary flex items-center justify-center hover:opacity-90 active:scale-95 transition-all shadow-sm">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<div class="flex flex-wrap gap-2 mt-2">
<div class="inline-flex items-center gap-1 px-3 py-1.5 rounded-full font-label-md text-label-md bg-secondary-container text-on-secondary-container">
                            喜欢恐龙
                            <button class="text-on-secondary-container/70 hover:text-on-secondary-container rounded-full p-0.5"><span class="material-symbols-outlined text-[16px]">close</span></button>
</div>
<div class="inline-flex items-center gap-1 px-3 py-1.5 rounded-full font-label-md text-label-md bg-secondary-container text-on-secondary-container">
                            害怕吸尘器
                            <button class="text-on-secondary-container/70 hover:text-on-secondary-container rounded-full p-0.5"><span class="material-symbols-outlined text-[16px]">close</span></button>
</div>
</div>
</div>
</div>
</section>
<!-- Events Record Section -->
<section class="flex flex-col gap-md">
<div class="flex justify-between items-end">
<h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-2">
<span>📋</span> 事件记录
                    <span class="font-label-md text-label-md text-secondary font-normal ml-1">(共 3 条)</span>
</h2>
<button class="font-label-md text-label-md text-primary font-medium hover:opacity-80 active:scale-95">查看全部</button>
</div>
<div class="bg-surface-container-lowest rounded-xl p-md shadow-diffuse border border-outline-variant/30 relative">
<!-- Timeline Line -->
<div class="absolute left-[35px] top-lg bottom-lg w-[2px] border-l-2 border-dashed border-outline-variant/50"></div>
<div class="flex flex-col gap-lg relative z-10">
<!-- Event Card 1 (Incomplete) -->
<div class="flex gap-md group">
<!-- Timeline Node -->
<div class="w-10 flex-shrink-0 flex justify-center mt-1">
<div class="w-4 h-4 rounded-full bg-error-container border-2 border-error z-10 relative"></div>
</div>
<!-- Card Content -->
<div class="flex-1 bg-surface-container hover:bg-surface-container-high transition-colors rounded-lg p-3 border border-error-container">
<div class="flex justify-between items-start mb-2">
<div class="flex items-center gap-2">
<span class="font-footnote text-footnote text-secondary">今天 14:30</span>
<span class="px-1.5 py-0.5 rounded text-[10px] font-medium bg-error/10 text-error inline-flex items-center gap-0.5">
                                        待补全 <span class="material-symbols-outlined text-[12px]">warning</span>
</span>
</div>
<div class="flex gap-1 text-secondary">
<button class="p-1 hover:text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-[18px]">edit</span></button>
</div>
</div>
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-0.5 rounded-full bg-primary-container/20 text-on-primary-container font-label-md text-[12px]">情绪爆发</span>
</div>
<p class="font-body-md text-body-md text-on-surface line-clamp-2">
                                在超市排队时突然开始尖叫并试图跑开，可能因为环境太吵闹。记录不完整，需要补充前因后果。
                            </p>
</div>
</div>
<!-- Event Card 2 -->
<div class="flex gap-md group">
<div class="w-10 flex-shrink-0 flex justify-center mt-1">
<div class="w-4 h-4 rounded-full bg-surface-container-lowest border-2 border-tertiary z-10 relative"></div>
</div>
<div class="flex-1 bg-surface-container hover:bg-surface-container-high transition-colors rounded-lg p-3 border border-outline-variant/20">
<div class="flex justify-between items-start mb-2">
<div class="flex items-center gap-2">
<span class="font-footnote text-footnote text-secondary">昨天 09:15</span>
</div>
<div class="flex gap-1 text-secondary opacity-0 group-hover:opacity-100 transition-opacity md:opacity-100">
<button class="p-1 hover:text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-[18px]">edit</span></button>
<button class="p-1 hover:text-error active:scale-90 transition-transform"><span class="material-symbols-outlined text-[18px]">delete</span></button>
</div>
</div>
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-0.5 rounded-full bg-primary-container/20 text-on-primary-container font-label-md text-[12px]">常规记录</span>
</div>
<p class="font-body-md text-body-md text-on-surface line-clamp-2">
                                早上起床流程顺利，成功使用视觉提示卡完成了洗漱。
                            </p>
</div>
</div>
</div>
</div>
</section>
<!-- Bottom spacing for FAB/Scrolling -->
<div class="h-8"></div>
</main>
<!-- Bottom Navigation Component from JSON (Semantic Shell Mandate: Edit Profile screen implies focus, but requirements don't explicitly forbid. Given 'Settings' tab exists in JSON, we'll map Profiles -> active if needed. However, since this is a specific *edit* sub-page with Cancel/Save top actions, the UX Goal rule: "If designing a user settings page... Task-Focused: Any sub-page featuring a Close or Back action... suppress navigation" applies. So BottomNav is suppressed here to prioritize the canvas.) -->
</body></html>
