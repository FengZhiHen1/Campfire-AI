# =============================================================================
# Campfire-AI — Nginx Site Configuration
# HTTPS termination + API proxy + SSE streaming + Health check
# =============================================================================

# ---------------------------------------------------------------------------
# Production: HTTP → HTTPS redirect (80 port)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name campfire-ai.example.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# Production: HTTPS server (443 port)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name campfire-ai.example.com;

    # TLS 1.3 only — no fallback to older protocols
    ssl_protocols TLSv1.3;

    # SSL certificates (production certs mounted via Docker Compose volumes)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # TLS session cache for reduced handshake overhead
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Standard proxy headers (inherited by all location blocks)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------
    # Location 1: SSE streaming — /api/v1/consult/stream
    # Disable buffering for real-time token-by-token delivery
    # ------------------------------------------------------------------
    location /api/v1/consult/stream {
        proxy_pass http://api-server:8000;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Core: disable buffering for real-time SSE streaming
        proxy_buffering off;
        proxy_cache off;

        # HTTP/1.1 with cleared Connection header for keep-alive streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeout: allow long-lived SSE connections (1 hour)
        proxy_read_timeout 3600s;

        # Connection timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;

        # Notify upstream when client disconnects (prevents wasted LLM tokens)
        proxy_ignore_client_abort off;
    }

    # ------------------------------------------------------------------
    # Location 2: Health check — /health
    # Fast-fail with short timeout for Docker HEALTHCHECK
    # ------------------------------------------------------------------
    location /health {
        proxy_pass http://api-server:8000;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Short timeout for rapid health check failure detection
        proxy_read_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Location 3: Regular API proxy — /api/v1/*
    # Buffering enabled for efficient response handling
    # ------------------------------------------------------------------
    location /api/v1/ {
        proxy_pass http://api-server:8000;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffering: enabled for regular API responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Timeouts: balanced for typical LLM API calls
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ------------------------------------------------------------------
    # Location 4: Static assets — /static/* (reserved for H5 admin panel)
    # Uncomment when H5 management backend is introduced
    # ------------------------------------------------------------------
    # location /static/ {
    #     root /usr/share/nginx/html;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # ------------------------------------------------------------------
    # Error interception: only override 502/503 with custom pages
    # Business errors (422/429/500) are passed through transparently
    # ------------------------------------------------------------------
    proxy_intercept_errors on;
    error_page 502 /502.html;
    error_page 503 /503.html;
}

# ---------------------------------------------------------------------------
# Development: HTTP (8080) + HTTPS (8443)
# Same routing rules and proxy parameters as production — ports only differ
# ---------------------------------------------------------------------------
server {
    listen 8080;
    listen 8443 ssl http2;
    server_name localhost;

    # TLS 1.3 only
    ssl_protocols TLSv1.3;

    # SSL certificates (self-signed dev certs generated by Dockerfile)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # TLS session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Standard proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------
    # Location 1: SSE streaming
    # ------------------------------------------------------------------
    location /api/v1/consult/stream {
        proxy_pass http://api-server:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;

        proxy_ignore_client_abort off;
    }

    # ------------------------------------------------------------------
    # Location 2: Health check
    # ------------------------------------------------------------------
    location /health {
        proxy_pass http://api-server:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Location 3: Regular API proxy
    # ------------------------------------------------------------------
    location /api/v1/ {
        proxy_pass http://api-server:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ------------------------------------------------------------------
    # Location 4: Static assets (reserved)
    # ------------------------------------------------------------------
    # location /static/ {
    #     root /usr/share/nginx/html;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Error interception
    proxy_intercept_errors on;
    error_page 502 /502.html;
    error_page 503 /503.html;
}
