# =============================================================================
# Campfire-AI — Nginx Site Configuration
# HTTPS termination + API proxy + SSE streaming + H5 static hosting
#
# 适用场景：
#   1. 域名 + Cloudflare 代理（推荐，无需 ICP 备案）
#   2. 直接使用服务器 IP + 自签名证书访问
#   3. HTTP-only 访问（如需临时关闭 HTTPS 跳转，见下方注释）
# =============================================================================

# ---------------------------------------------------------------------------
# Production: HTTP → HTTPS redirect (80 port)
# ---------------------------------------------------------------------------
# 注意：若使用 Cloudflare "Flexible" SSL 模式（不推荐），或仅用 IP 访问且
# 不需要 HTTPS，可将此 server 块注释掉，并把下方 443 的 listen 改为 80。
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;  # 接受任意 server_name，适配 IP 访问和 Cloudflare

    # 仅处理 ACME challenge（Let's Encrypt 验证），其余跳转 HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# Production: HTTPS server (443 port)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name _;  # 接受任意 server_name

    # TLS 1.2/1.3 — 兼容 Cloudflare Origin CA 和 Let's Encrypt
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # SSL certificates (production certs mounted via Docker Compose volumes)
    # 开发环境使用 Dockerfile 生成的自签名证书；生产环境请替换为真实证书
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Cloudflare Authenticated Origin Pulls
    # 验证客户端证书，确保只有真正的 Cloudflare 边缘节点能访问源站
    ssl_client_certificate /etc/nginx/ssl/authenticated_origin_pull_ca.pem;
    ssl_verify_client on;

    # TLS session cache for reduced handshake overhead
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ------------------------------------------------------------------
    # H5 单页应用托管 — 根路径 /
    # ------------------------------------------------------------------
    root /usr/share/nginx/html/h5;
    index index.html;

    location / {
        # SPA 路由回退：找不到静态文件时返回 index.html
        try_files $uri $uri/ /index.html;

        # 不缓存 HTML，避免更新后评委看到旧版本
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 静态资源长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Standard proxy headers (inherited by API location blocks)
    # ------------------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------
    # Location 1: SSE streaming — /api/v1/consult/stream
    # Disable buffering for real-time token-by-token delivery
    # ------------------------------------------------------------------
    location /api/v1/consult/stream {
        proxy_pass http://api-server;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Core: disable buffering for real-time SSE streaming
        proxy_buffering off;
        proxy_cache off;

        # HTTP/1.1 with cleared Connection header for keep-alive streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeout: allow long-lived SSE connections (1 hour)
        proxy_read_timeout 3600s;

        # Connection timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;

        # Notify upstream when client disconnects (prevents wasted LLM tokens)
        proxy_ignore_client_abort off;
    }

    # ------------------------------------------------------------------
    # Location 2: Health check — /health
    # Fast-fail with short timeout for Docker HEALTHCHECK
    # ------------------------------------------------------------------
    location /health {
        proxy_pass http://api-server;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Short timeout for rapid health check failure detection
        proxy_read_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Location 3: FastAPI auto-generated docs
    # ------------------------------------------------------------------
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://api-server;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ------------------------------------------------------------------
    # Location 4: Regular API proxy — /api/v1/*
    # Buffering enabled for efficient response handling
    # ------------------------------------------------------------------
    location /api/v1/ {
        proxy_pass http://api-server;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffering: enabled for regular API responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Timeouts: balanced for typical LLM API calls
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ------------------------------------------------------------------
    # Error interception: only override 502/503 with custom pages
    # Business errors (422/429/500) are passed through transparently
    # ------------------------------------------------------------------
    proxy_intercept_errors on;
    error_page 502 /502.html;
    error_page 503 /503.html;
}

# ---------------------------------------------------------------------------
# Development: HTTP (8080) + HTTPS (8443)
# Same routing rules and proxy parameters as production — ports only differ
# ---------------------------------------------------------------------------
server {
    listen 8080;
    listen 8443 ssl http2;
    server_name localhost;

    # TLS 1.2/1.3
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # SSL certificates (self-signed dev certs generated by Dockerfile)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # TLS session cache
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # H5 SPA
    root /usr/share/nginx/html/h5;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Standard proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE streaming
    location /api/v1/consult/stream {
        proxy_pass http://api-server;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;

        proxy_ignore_client_abort off;
    }

    # Health check
    location /health {
        proxy_pass http://api-server;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 10s;
    }

    # FastAPI docs
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://api-server;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Regular API proxy
    location /api/v1/ {
        proxy_pass http://api-server;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Error interception
    proxy_intercept_errors on;
    error_page 502 /502.html;
    error_page 503 /503.html;
}
