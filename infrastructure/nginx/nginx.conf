worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript text/javascript;
    gzip_min_length 256;

    # Upstream: FastAPI API server (resolved via campfire-net internal DNS)
    upstream campfire_api {
        server api-server:8000;
    }

    # Include site-specific configurations
    include /etc/nginx/conf.d/*.conf;

    # Default server block
    server {
        listen 80;
        server_name _;

        # Health check passthrough
        location /health {
            proxy_pass http://campfire_api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy
        location / {
            proxy_pass http://campfire_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }
    }
}
