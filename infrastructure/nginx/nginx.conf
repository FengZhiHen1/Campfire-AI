worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # JSON structured access log (output to stdout for Docker log driver)
    log_format json escape=json '{'
        '"time_local": "$time_local",'
        '"remote_addr": "$remote_addr",'
        '"remote_user": "$remote_user",'
        '"request": "$request",'
        '"status": "$status",'
        '"body_bytes_sent": "$body_bytes_sent",'
        '"request_time": "$request_time",'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent",'
        '"http_x_forwarded_for": "$http_x_forwarded_for",'
        '"http_x_request_id": "$http_x_request_id"'
    '}';

    access_log /dev/stdout json;
    error_log /dev/stderr warn;

    # Gzip compression
    gzip on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types application/json text/css text/plain text/javascript;

    # Upstream: FastAPI API server (Docker internal DNS via service name)
    upstream api-server {
        server api-server:8000;
    }

    # Include site-specific server configurations
    include /etc/nginx/conf.d/*.conf;
}
