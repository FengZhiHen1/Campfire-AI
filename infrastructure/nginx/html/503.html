<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 服务繁忙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .error-container {
            text-align: center;
            padding: 48px 32px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 90%;
        }
        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: #e0e0e0;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 15px;
            color: #888;
            line-height: 1.6;
        }
        .error-action {
            margin-top: 28px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">503</div>
        <div class="error-title">服务繁忙</div>
        <div class="error-message">服务繁忙，请稍后重试</div>
        <div class="error-action">如持续遇到此问题，请联系技术支持</div>
    </div>
</body>
</html>
